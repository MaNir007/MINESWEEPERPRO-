<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Pro+</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/themes.css">
</head>
<body oncontextmenu="return false;">

    <div id="bg-effects"></div>

    <div class="container">
        <section id="auth-card" class="card">
            <h1>MINESWEEPER<span class="glitch">PRO+</span></h1>
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Korisničko ime..." class="input-field" maxlength="15">
                <small id="login-error" class="error-msg hidden">Ime je prekratko!</small>
            </div>
            <div class="menu-buttons">
                <button class="btn btn-primary" onclick="login()">
                    <span class="btn-text">PRIJAVI SE</span>
                    <div class="btn-hover-effect"></div>
                </button>
                <button class="btn" onclick="playAsGuest()">IGRAJ KAO GOST</button>
            </div>
        </section>

        <section id="menu" class="card hidden">
            <div class="profile-summary">
                <h2 id="welcome-msg">Dobrodošli, Agent</h2>
                <div class="global-stats">
                    <span class="stat-item">Ukupno mina: <b id="total-mines-stat">0</b></span>
                </div>
            </div>
            
            <div class="settings-group">
                <div class="selection-wrapper">
                    <label for="difficulty-select">OPERATIVNA TEŽINA</label>
                    <select id="difficulty-select" class="input-field" onchange="toggleCustom()">
                        <option value="easy">Easy (6x6)</option>
                        <option value="medium" selected>Medium (10x10)</option>
                        <option value="hard">Hard (15x15)</option>
                        <option value="impossible">Impossible (20x20)</option>
                        <option value="custom">Custom Mode</option>
                    </select>
                </div>
                
                <div id="custom-inputs" class="custom-grid-setup hidden">
                    <div class="mini-input">
                        <label>Veličina</label>
                        <input type="number" id="custom-size" value="10" min="5" max="30" class="input-field">
                    </div>
                    <div class="mini-input">
                        <label>Mine</label>
                        <input type="number" id="custom-mines" value="15" min="1" class="input-field">
                    </div>
                </div>
            </div>

            <div class="menu-buttons">
                <button class="btn btn-primary" onclick="startGame('Training')">POKRENI TRENING</button>
                <button class="btn" onclick="startGame('Career')">ZAPOČNI KARIJERU</button>
            </div>
            
            <div class="mini-games-section section-divider">
                <h3 class="section-title">SPESIJALNE OPERACIJE</h3>
                <div class="menu-buttons">
                    <button class="btn btn-primary btn-daily" onclick="startGame('Daily')">
                        <span data-svg="target" data-width="18" data-height="18" data-class="svg-target"></span>
                        DNEVNI IZAZOV
                    </button>
                    <button class="btn" onclick="startGame('MineDash')">MINE DASH (SPEED)</button>
                    <button class="btn" onclick="startGame('TreasureHunter')">TREASURE HUNTER (MEMORIJA)</button>
                    <button class="btn" onclick="startGame('ChainReaction')">CHAIN REACTION (PUZZLE)</button>
                </div>
            </div>
            <div id="shop-section" class="section-divider">
                <h3 class="section-title gold">
                    CRNO TRŽIŠTE 
                    <span class="coins-container">
                        <span id="coins-display">0</span> 
                        <span data-svg="coin" data-width="18" data-height="18" data-class="svg-coin"></span>
                    </span>
                </h3>
                <div class="perk-btn-group">
                    <button class="btn btn-small btn-perk" onclick="buyPerk('radar', 50)">
                        RADAR (50 <span data-svg="coin" data-width="14" data-height="14"></span>)
                    </button>
                    <button class="btn btn-small btn-perk" onclick="buyPerk('defuse', 100)">
                        DEFUSE KIT (100 <span data-svg="coin" data-width="14" data-height="14"></span>)
                    </button>
                </div>
            </div>
            
            <p id="high-level-display" class="career-status"></p>
            
            <div id="leaderboard-section" class="section-divider">
                <h3 class="section-title gold">TOP 10 AGENTA</h3>
                <ul id="leaderboard-list" class="leaderboard-list">
                    <li class="leaderboard-empty">Učitavanje...</li>
                </ul>
            </div>
        </section>

        <header id="hud" class="card hidden">
            <div class="hud-content">
                <div class="hud-user">
                    <span class="label">AGENT:</span>
                    <span id="current-user" class="value"></span>
                </div>
                <div class="hud-main-stats">
                    <div class="stat">
                        <span class="label">LVL</span>
                        <span id="level-val" class="value">1</span>
                    </div>
                    <div class="stat">
                        <span class="label">MINES</span>
                        <span id="mine-val" class="value">0</span>
                    </div>
                    <div class="stat">
                        <span class="label">TIME</span>
                        <span id="timer-val" class="value">00:00</span>
                    </div>
                </div>
                <button class="btn-exit" onclick="confirmExit()" title="Prekini misiju">×</button>
            </div>
        </header>

        <main id="game-container" class="hidden">
            <div id="game-scroll-wrapper">
                <div id="game"></div>
            </div>
        </main>
    </div>

    <div id="message-overlay" class="overlay hidden">
        <div class="overlay-content card">
            <div class="icon-box" id="result-icon"></div>
            <h2 id="overlay-title">POBJEDA</h2>
            <p id="overlay-text">Sva polja su uspješno dekodirana.</p>
            <div class="reward-info hidden" id="reward-box">
                +1 Career Level
            </div>
            <button class="btn btn-primary" onclick="closeOverlay()">NASTAVI</button>
        </div>
    </div>

    <script src="js/svg-loader.js?v=2.1"></script>
    <script src="js/globals.js?v=2.1"></script>
    <script src="js/api.js?v=2.1"></script>
    <script src="js/ui.js?v=2.1"></script>
    <script src="js/timer.js?v=2.1"></script>
    <script src="js/game.js?v=2.1"></script>
</body>
</html>
